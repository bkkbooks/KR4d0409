body:
  text: 在軒集别集類三宋提要臣等謹案在軒集一卷宋黃公紹撰公紹字直翁昭武人宋咸淳元年進士集中樵川新驛記稱至元二十三年是嵗上距宋亡已十年記中自稱曰民蓋入元未仕故仍標為宋人焉公紹嘗取胡安國心要在腔子裏語名所居曰在軒因以名集然所載僅文三十九篇詩餘二十八首其文三十九篇之中為儒言者六篇而為佛氏疏榜之語者乃三十三篇殆原本散逸後人掇拾遺稿以僧徒重其筆墨藏弆為榮故所收特多歟考厲鶚宋詩紀事托採最博而求公紹一詩不可得僅以西湖棹歌十首介于詩詞之間者當之知鶚所見亦此本别無全集矣公紹嘗作古今韻㑹有名于世然原本久已散佚今傳者乃熊忠舉要已非復公紹之原本真出公紹手者惟此一卷耳宋人遺集不傳者多公紹在當時為耆宿雖殘編猶可寶也書在軒銘後一篇記詞曰以下乃其友莫升之文意當時手迹必併載於末故其文義相屬亦仍併録之存其舊焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d91ce443245518a5052cd082fe91ab55032e5798d415e7db4d7bc77210c5dd63
